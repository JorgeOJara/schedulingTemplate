services:
  mysql:
    image: mysql:8.0
    container_name: scheduling-mysql
    restart: unless-stopped
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-secure_root_password_here}
      MYSQL_DATABASE: ${MYSQL_DATABASE:-scheduling}
      MYSQL_USER: ${MYSQL_USER:-scheduling_user}
      MYSQL_PASSWORD: ${MYSQL_PASSWORD:-scheduling_pass}
    ports:
      - "127.0.0.1:${MYSQL_PORT:-3307}:3306"
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD-SHELL", "mysqladmin ping -h 127.0.0.1 -uroot -p$$MYSQL_ROOT_PASSWORD --silent"]
      interval: 10s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      - scheduling_network

  adminer:
    image: adminer:4.8.1
    container_name: scheduling-adminer
    restart: unless-stopped
    ports:
      - "127.0.0.1:${ADMINER_PORT:-8082}:8080"
    depends_on:
      mysql:
        condition: service_healthy
    networks:
      - scheduling_network

  api:
    init: true
    build:
      context: .
      dockerfile: infra/docker/api/Dockerfile.prod
    container_name: scheduling-api
    restart: unless-stopped
    ports:
      - "127.0.0.1:${API_PORT:-3001}:3000"
    environment:
      NODE_ENV: production
      PORT: 3000
      DATABASE_URL: mysql://${MYSQL_USER:-scheduling_user}:${MYSQL_PASSWORD:-scheduling_pass}@mysql:3306/${MYSQL_DATABASE:-scheduling}
      JWT_SECRET: ${API_JWT_SECRET:-super-secret-jwt-key-at-least-32-characters-long-minimum}
      JWT_EXPIRY: 15m
      REFRESH_TOKEN_EXPIRY: 7d
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:${WEB_PORT:-8083},http://127.0.0.1:${WEB_PORT:-8083},https://${APP_DOMAIN:-simpleschedule.online},https://www.${APP_DOMAIN:-simpleschedule.online}}
      COOKIE_SECURE: ${COOKIE_SECURE:-false}
      RATE_LIMIT_WINDOW: "900000"
      RATE_LIMIT_MAX: "100"
      AUTH_RATE_LIMIT_MAX: ${AUTH_RATE_LIMIT_MAX:-100}
      LOG_LEVEL: info
    depends_on:
      mysql:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000/health >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 20s
    volumes:
      - /home/codenovallc/cineprivado/infra/certbot/conf:/etc/letsencrypt:ro
    networks:
      - scheduling_network

  web:
    build:
      context: .
      dockerfile: infra/docker/web/Dockerfile.prod
      args:
        VITE_API_URL: ${VITE_API_URL:-/api/v1}
    container_name: scheduling-web
    restart: unless-stopped
    ports:
      - "127.0.0.1:${WEB_PORT:-8083}:80"
    depends_on:
      api:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1/healthz >/dev/null 2>&1 || exit 1"]
      interval: 15s
      timeout: 5s
      retries: 8
      start_period: 10s
    volumes:
      - /home/codenovallc/cineprivado/infra/certbot/conf:/etc/letsencrypt:ro
    networks:
      - scheduling_network

networks:
  scheduling_network:
    driver: bridge

volumes:
  mysql_data:
